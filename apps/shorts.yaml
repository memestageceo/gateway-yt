apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: shorts
  name: shorts
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shorts
  strategy: {}
  template:
    metadata:
      labels:
        app: shorts
    spec:
      containers:
        - image: ealen/echo-server
          name: echo-server
          resources: {}
          ports:
            - name: http
              containerPort: 80
          env:
            - name: VARIANT
              value: v1
status: {}

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: shorts
  name: svc-shorts
spec:
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 80
  selector:
    app: shorts
status:
  loadBalancer: {}
