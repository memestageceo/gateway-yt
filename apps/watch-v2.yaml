---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: watch-v2
  name: watch-v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: watch-v2
  strategy: {}
  template:
    metadata:
      labels:
        app: watch-v2
    spec:
      containers:
        - image: ealen/echo-server
          name: echo-server
          resources: {}
          env:
            - name: VARIANT
              value: v2
status: {}

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: watch-v2
  name: svc-watch-v2
spec:
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80
  selector:
    app: watch-v2
status:
  loadBalancer: {}
